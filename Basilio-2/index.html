<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Simples</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Minha Conta</h1>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab(0)">Login</button>
    <button class="tab-btn" onclick="showTab(1)">Cadastrar</button>
  </div>

  <form id="registerForm" action="login.php" method="POST"></form>
    <input type="email" name="email" id="loginEmail" placeholder="Digite seu email" required>
    <input type="password" name="senha" id="loginSenha" placeholder="Senha" required>
    <button type="submit">Entrar</button>
    <p id="loginMessage" class="message"></p>
  </form>

  <form id="registerForm" action="register.php" method="POST" style="display: none;">
    <input type="email" name="email" id="registerEmail" placeholder="Digite seu email" required>
    <input type="password" name="senha" id="registerSenha" placeholder="Crie uma senha (mín. 6 caracteres)" required>
    <input type="password" id="confirmSenha" placeholder="Confirme a senha" required>
    <button type="submit">Cadastrar</button>
    <p id="registerMessage" class="message"></p>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
